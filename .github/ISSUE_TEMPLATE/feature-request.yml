name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What learning problem does this solve?
      description: Describe the concept or problem a learner struggles with.
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe what you would like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you thought about.

  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: Screenshots, examples, or references that help explain the request.
